<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Manager – #30DaysOfJS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">JS</div>
      <div>
        <div class="header-title">Student Manager</div>
        <div class="header-sub">#30DaysOfJS · Jour 30</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-item">
        <div id="totalStudents" class="stat-value">0</div>
        <div class="stat-label">Étudiants</div>
      </div>
      <div class="stat-item">
        <div id="classAverage" class="stat-value">0</div>
        <div class="stat-label">Moyenne</div>
      </div>
      <div class="stat-item">
        <div id="bestStudent" class="stat-value">—</div>
        <div class="stat-label">Meilleur</div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- SIDEBAR : Formulaire -->
    <aside class="sidebar">
      <div class="form-title">
        <span id="formIcon">➕</span>
        <span id="formTitle">Ajouter un étudiant</span>
      </div>

      <form id="studentForm" class="student-form">
        <input type="hidden" id="studentId">

        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="firstName" placeholder="Ex: Amina" required>
        </div>

        <div class="form-group">
          <label>Nom</label>
          <input type="text" id="lastName" placeholder="Ex: Barre" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Ex: amina@bakeli.tech" required>
        </div>

        <div class="form-group">
          <label>Matière</label>
          <select id="subject" required>
            <option value="">Choisir une matière</option>
            <option value="JavaScript">JavaScript</option>
            <option value="HTML/CSS">HTML/CSS</option>
            <option value="React">React</option>
            <option value="Node.js">Node.js</option>
            <option value="Python">Python</option>
            <option value="Base de données">Base de données</option>
          </select>
        </div>

        <div class="form-group">
          <label>Note (/20)</label>
          <input type="number" id="grade" placeholder="Ex: 16" min="0" max="20" required>
        </div>

        <div class="form-buttons">
          <button type="submit" id="submitBtn" class="btn-primary">➕ Ajouter</button>
          <button type="button" id="cancelBtn" class="btn-secondary hidden">✕ Annuler</button>
        </div>
      </form>
    </aside>

    <!-- CONTENT : Liste des étudiants -->
    <section class="content">

      <!-- Barre de recherche et filtres -->
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Rechercher un étudiant...">
        </div>
        <div class="filters">
          <select id="subjectFilter">
            <option value="">Toutes les matières</option>
            <option value="JavaScript">JavaScript</option>
            <option value="HTML/CSS">HTML/CSS</option>
            <option value="React">React</option>
            <option value="Node.js">Node.js</option>
            <option value="Python">Python</option>
            <option value="Base de données">Base de données</option>
          </select>
          <select id="sortFilter">
            <option value="newest">Plus récent</option>
            <option value="name">Nom A→Z</option>
            <option value="grade-desc">Note ↓</option>
            <option value="grade-asc">Note ↑</option>
          </select>
        </div>
      </div>

      <!-- Résultats -->
      <div class="results-info">
        <span id="resultsCount">0 étudiant(s)</span>
        <button id="clearAllBtn" class="btn-danger-outline">🗑 Tout supprimer</button>
      </div>

      <!-- Liste -->
      <div id="studentGrid" class="student-grid">
        <div class="empty-state">
          <div class="empty-icon">👨‍🎓</div>
          <div class="empty-title">Aucun étudiant</div>
          <div class="empty-sub">Ajoute ton premier étudiant avec le formulaire</div>
        </div>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="pagination hidden"></div>

    </section>
  </main>

  <!-- MODAL de confirmation -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <div class="modal-title">Confirmer la suppression</div>
      <div class="modal-text">Cette action est irréversible.</div>
      <div class="modal-buttons">
        <button id="modalCancel" class="btn-secondary">Annuler</button>
        <button id="modalConfirm" class="btn-danger">Supprimer</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
